async function saveOrder(){
  const customer = JSON.parse(localStorage.getItem("customer"));
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  
  const orderNumber = "B3B3-" + Date.now();
  
  const order = {
    Timestamp: new Date().toLocaleString('en-GH', {timeZone: 'Africa/Accra'}),
    OrderID: orderNumber,
    Customer: customer.name,
    Items: cart.map(i => `${i.name} x${i.qty}`).join(', '),
    Total: cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
    Size: customer.selectedSize,
    Status: "processing"
  
  };

  
  try {
    const res = await fetch('http://localhost:3000/save-order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(order)
    });
    
    if(!res.ok) throw new Error(`Server Error: ${res.status}`);
    console.log('WhatsApp sent âś…');
    alert('Order placed! Check WhatsApp');
    
  } catch (err) {
    console.error('Error:', err);
    alert('Order failed: ' + err.message);
  }
}



</script>
