<style>

.shop-header{
text-align:center;
padding:60px 30px;
background:#111;
color:rgba(254, 171, 4, 0.979);
}

.shop-container{
padding:40px 10%;
}
/* Reset page background */
body {
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

/* Main wrapper - this is the key part */
.products-wrapper {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
  background: #fff;
}

/* Each product card */
.product-card {
  width: 100%;
  display: flex;
  flex-direction: column;
}

/* Make images fill card width */
.product-card img {
  width: 100%;
  height: 180px; /* Force same height for all images */
  object-fit: cover; /* Crop instead of stretching */
  border-radius: 10px 10px 0 0;
}

/* Tablet: 2 columns */
@media (max-width: 992px) {
  .products-wrapper {
    grid-template-columns: repeat(auto-fill,minmax(260px, 1fr));
    gap: 16px;
    padding: 16px;
  }
}

/* Mobile: 1 column */
@media (max-width: 600px) {
  .products-wrapper {
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 12px;
  }
}

.product-info{
padding: 12px;
}

.product-info h3{
margin-bottom:10px;
}


.price{
font-size:18px;
font-weight:bold;
color:#d97706;
margin-bottom:15px;
}

.add-btn{
width:100%;
padding:12px;
background:#d97706;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

</style>
</head>
